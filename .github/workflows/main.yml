name: IMDb Scraper

on: [push]

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Playwright
        run: |
          pip install playwright
          playwright install

      - name: Run IMDb Scraper 24f2001824@ds.study.iitm.ac.in
        run: python imdb_movies.py
